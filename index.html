<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ytemd</title>
  
  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="64" y2="64"><stop offset="0" stop-color="%23CC7722"/><stop offset="1" stop-color="%23ff9f3f"/></linearGradient></defs><rect x="8" y="12" width="48" height="40" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/><rect x="16" y="20" width="32" height="24" rx="8" fill="url(%23g)" opacity="0.95"/><path d="M30 26 L42 32 L30 38 Z" fill="white" opacity="0.95"/></svg>' />

</head>
<body>
  <header>
    <div class="header-inner">
      <button class="btn" id="pasteBtn" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-upload" viewBox="0 0 16 16">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
            <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
        </svg>
        <span>Paste & Load</span>
      </button>
    </div>
  </header>

  <main>
    <section class="card" aria-live="polite">
      <div class="status" id="status">
        <strong>Ready.</strong> Paste or type a YouTube link (video or Shorts) and press Load.
      </div>

      <div class="controls">
        <div>
          <label for="urlInput">YouTube URL</label>
          <input id="urlInput" type="text" inputmode="url" placeholder="e.g. https://www.youtube.com/watch?v=VIDEO_ID or https://www.youtube.com/shorts/SHORT_ID" />
        </div>

        <div class="row">
          <button class="small-btn" id="loadBtn" type="button">Load</button>
          <button class="small-btn" id="clearBtn" type="button">Clear</button>
        </div>
      </div>

      <div class="player-wrap">
        <div class="video-box" id="videoBox">
          <iframe
            id="player"
            src="about:blank"
            title="YouTube player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
            referrerpolicy="strict-origin-when-cross-origin"
          ></iframe>
        </div>
      </div>

      <div class="hint">
        <span class="pill">Accepts: youtube.com, youtu.be, Shorts</span>
        <span class="pill">Tap-to-play</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
